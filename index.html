<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/076bf9a976.js" crossorigin="anonymous"></script>
    <title>Fanto</title>
</head>
<body>
    <!-- Hero with nav bar -->
    <div class="bg-[url('/hero.png')]  bg-cover h-[1200px] bg-center text-white">
        <!-- Navbar -->
    <header >
        <nav class="flex justify-between p-8">
            <!-- Logo -->
            <div class="font-bold">FANTO</div>

            <!-- Navlinks -->
            <div class="space-x-6">
                <a href="">Furniture</a>
                <a href="">Shop</a>
                <a href="">About Us</a>
                <a href="">Contact</a>
            </div>
            <!-- Icon -->
            <div>
                <i class="fa-solid fa-bag-shopping"></i>
            </div>
        </nav>
    </header>
    <div class="text-center mt-10">
        <h1 class="font-semibold text-6xl tracking-wide">Make Your Interior More <br> Minimalistic & Modern</h1>
        <p class="text-white/70 mt-10 text-lg">Turn your room with fanto into a lot more minimalist <br> and modern with ease and speed</p>

        <!-- Search  bar-->

         <div class="flex justify-center items-center mt-8">

            <div class="bg-white/30 rounded-2xl px-6 py-2 w-98 flex items-center">
                <input type="text" placeholder="Search Furniture" class="bg-transparent outline-none w-full">
                <div class="bg-orange-500 rounded-full p-2">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                
            </div>
         </div>
        
    </div>
    </div>

</html>
